version: '3'

tasks:
  setup:
    desc: Check dependencies and download flatc
    cmds:
      - go run main.go doctor

  verify:
    desc: Fast Go-only verification (vet + build + pure unit tests). No Excel required.
    cmds:
      - go vet ./...
      - go build ./...
      - go test -race -count=1 -timeout=60s ./pkg/...
      - go test -count=1 ./internal/config/...

  integration:
    desc: Excel-dependent or env-dependent integration tests.
    summary: |
      Runs:
        * internal/regtest  - Excel COM regression (requires Windows + installed Excel).
        * cmd/              - CLI regression (init / generate / build / doctor).
        * internal/generator - end-to-end Generate() (writes into a temp project tree
                               with go.mod; needs network for `go get`).
    cmds:
      - go test -count=1 -timeout=300s ./internal/regtest/...
      - go test -count=1 ./cmd/...
      - go test -count=1 ./internal/generator/...
