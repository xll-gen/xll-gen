project:
  name: "smoke_proj"
  version: "0.1.0"

events:
  - type: CalculationEnded
    handler: OnCalculationEnded

# Ribbon/macro command. Exercises the MSG_COMMAND_INVOKE (137) round-trip:
# the mock host sends a CommandInvokeRequest and asserts the delivery ack.
commands:
  - name: "RunReport"
    handler: "RunReport"

# Ribbon with a file image. Exercises ribbon_images.h generation; the mock
# host compiles the asset decoder TU and round-trips icon.png -> IPictureDisp.
ribbon:
  tab: "Smoke"
  groups:
    - label: "Test"
      buttons:
        - label: "Run"
          command: "RunReport"
          image: "./icon.png"

gen:
  go:
    package: "generated"

logging:
  level: "debug"
  path: "server.log"

server:
  workers: 10
  timeout: "5s"

functions:
  - name: "EchoInt"
    args: [{name: "val", type: "int"}]
    return: "int"
  - name: "EchoFloat"
    args: [{name: "val", type: "float"}]
    return: "float"
  - name: "EchoString"
    args: [{name: "val", type: "string"}]
    return: "string"
  - name: "EchoBool"
    args: [{name: "val", type: "bool"}]
    return: "bool"

  # Any & Range
  - name: "CheckAny"
    args: [{name: "val", type: "any"}]
    return: "string"
  - name: "CheckRange"
    args: [{name: "val", type: "range"}]
    return: "string"

  # Timeout
  - name: "TimeoutFunc"
    args: [{name: "val", type: "int"}]
    return: "int"
    timeout: "100ms"

  # Async
  - name: "AsyncEchoInt"
    args: [{name: "val", type: "int"}]
    return: "int"
    async: true

  # Schedule Commands
  - name: "ScheduleCmd"
    args: []
    return: "int"
  - name: "ScheduleFormatCmd"
    args: []
    return: "int"
  - name: "ScheduleMultiCmd"
    args: []
    return: "int"
  - name: "ScheduleMassive"
    args: []
    return: "int"
  - name: "ScheduleGridCmd"
    args: []
    return: "int"
